<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="admin.css">
</head>

<body>

<nav>
  <div class="logo">CommitteHub</div>
</nav>

<div class="container">

  <!-- Tabs -->
  <div class="tabs">
  <button class="tab-btn active" data-tab="announcement">Announcement</button>
  <button class="tab-btn" data-tab="issues">Issues</button>
  <button class="tab-btn" data-tab="events">Events</button>
  <button class="tab-btn" data-tab="roles">Roles</button>
</div>
  <!-- Announcement -->
  <div id="announcement" class="tab-content active">
    <h2>Make Announcement</h2>

    <select id="committee">
      <option>Technovanza</option>
      <option>Rangwardhan</option>
      <option>Enthusia</option>
      <option>Swachh VJTI</option>
      <option>Digital vjti</option>
      <option>Pratibimb</option>
      <option>Ecell</option>
      <option>Community of coders</option>
      <option>Digital Literary Activities</option>
    </select>

    <textarea id="announcementText" placeholder="Write announcement..."></textarea>
    <button id="postAnnouncement" class="submit-btn">Post</button>
  </div>

<div id="issues" class="tab-content">
  <h2>Reported Issues</h2>

  
</div>


  <!-- Events -->
  <div id="events" class="tab-content">
    <h2>Create Event</h2>

    <input type="text" id="eventName" placeholder="Event Name">
    <input type="date" id="eventDate">
    <input type="time" id="eventTime">
    <input type="text" id="eventLocation" placeholder="Location">

    <select id="eventCommittee">
      <option>Technovanza</option>
      <option>Rangwardhan</option>
      <option>Enthusia</option>
      <option>Swachh VJTI</option>
      <option>Digital vjti</option>
      <option>Pratibimb</option>
      <option>Ecell</option>
      <option>Community of coders</option>
      <option>Digital Literary Activities</option>
    </select>

    <textarea id="eventDesc" placeholder="Short Description"></textarea>

    <button id="postEvent" class="submit-btn">Post Event</button>

    <!-- Preview Card -->
    <div id="eventPreview"></div>
  </div>

 <!-- Roles Tab -->
<div id="roles" class="tab-content">    
    <h2>Role Approval Panel</h2>

    <main class="main-container">
        <h4>Pending Requests</h4>

        <!-- Requests will load here -->
        <div id="requests" class="requests-grid"></div>
    </main>
</div>

    

<script src="admin.js"></script>
<script src="issue.js"></script>
<script src="addevent/addevent.js"></script>
<script src="addannouncement/addannouncement.js"></script>
<script src="role/role.js"></script>
</body>
</html>
