<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connect With Us</title>

<link rel="stylesheet" href="connect.css">
</head>

<body>

<div class="connect-container">

  <!-- Header -->
  <div class="connect-header">
    <h1>Connect With Us</h1>
    <p>Select a committee to view contact details</p>
  </div>

  <!-- Dropdown -->
  <select id="committeeSelect" onchange="updateCommittee()">
    <option value="">Select Committee</option>
    <option value="enthusia">Enthusia</option>
    <option value="technovanza">Technovanza</option>
    <option value="swachh">Swachh VJTI</option>
    <option value="ecell">E-Cell</option>
    <option value="digital">Digital VJTI</option>
    <option value="rangawardhan">Rangawardhan</option>
    <option value="pratibimb">Pratibimb</option>
    <option value="dla">Digital Literary Activities</option>
    <option value="coc">Community of Coders</option>
  </select>

  <!-- Content -->
  <div id="committeeContent" class="content-box">
    <p>Select a committee to view details</p>
  </div>

</div>

<script>
const committeeData = {
  enthusia: {
    email: "enthusia@vjti.ac.in",
    phone: "+91 11111 11111",
    instagram: "https://www.instagram.com/enthusiavjti?igsh=cWQ0dmNweTBndXo3"
  },
  technovanza: {
    email: "technovanza@vjti.ac.in",
    phone: "+91 22222 22222",
    instagram: "https://www.instagram.com/technovanza?igsh=ZXA1OTZtMjdiMGJj"
  },
  swachh: {
    email: "swachh@vjti.ac.in",
    phone: "+91 33333 33333",
    instagram: "https://www.instagram.com/swachhvjti?igsh=OTZyMXR4d3ZyYmw1",
  },
  ecell: {
    email: "ecell@vjti.ac.in",
    phone: "+91 44444 44444",
    instagram: "https://www.instagram.com/ecellvjti?igsh=MWFjdjN6YmIwemlxbw=="
  },
  digital: {
    email: "digital@vjti.ac.in",
    phone: "+91 55555 55555",
    instagram: "https://www.instagram.com/digital.vjti?igsh=cmdqaGNyMjIwaTFx"
    
  },
  rangawardhan: {
    email: "rangawardhan@vjti.ac.in",
    phone: "+91 66666 66666",
    instagram: "https://www.instagram.com/rangawardhan?igsh=MXVkejBxbHpjajJkaQ=="
    
  },
  pratibimb: {
    email: "pratibimb@vjti.ac.in",
    phone: "+91 77777 77777",
    instagram: " https://www.instagram.com/pratibimbvjti?igsh=MWZvbWE5dWh4c2h4Yg=="
  },
  dla: {
    email: "dla@vjti.ac.in",
    phone: "+91 88888 88888",
    instagram: "https://www.instagram.com/dla_vjti?igsh=eXNvaTRhYXQ0N3Iz"
  },
  coc: {
    email: "coc@vjti.ac.in",
    phone: "+91 99999 99999",
    instagram: "https://www.instagram.com/coc_vjti?igsh=MTh3czhydmM4M3JtMg=="
  }
};

function updateCommittee() {
  const value = document.getElementById("committeeSelect").value;
  const content = document.getElementById("committeeContent");

  if (!value) {
    content.innerHTML = "<p>Select a committee to view details</p>";
    return;
  }

  const data = committeeData[value];

  content.innerHTML = `
    <h2>${value.toUpperCase()}</h2>

    <div class="info">
      <p><strong>Email:</strong> <a href="mailto:${data.email}">${data.email}</a></p>
      <p><strong>Phone:</strong> ${data.phone}</p>
    </div>

    <div class="social">
      <a href="${data.instagram}" target="_blank">Instagram</a>
    </div>
  `;
}
</script>

</body>
</html>
